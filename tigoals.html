<script>

/* PARAM */
function getParam(n){
  return new URL(location.href).searchParams.get(n);
}

/* DECODE */
function decode(str){
  try{
    return decodeURIComponent(atob(str).split('').map(c =>
      '%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2)
    ).join(''));
  }catch(e){
    return str;
  }
}

const raw = getParam("url") || "";
const target = decode(raw) || "https://www.google.com/search?q=tigoals+live+candil";

document.getElementById("preview").innerText = target;

/* PROGRESS */
let duration = 12000;
let start = Date.now();

const bar = document.getElementById("bar");
const btn = document.getElementById("goBtn");

const timer = setInterval(()=>{

  let percent = Math.min(((Date.now()-start)/duration)*100,100);
  bar.style.width = percent+"%";

  if(percent >= 100){
    clearInterval(timer);

    btn.innerText = "🚀 Lanjut ke Tujuan";
    btn.href = target;
    btn.style.opacity = "1";
    btn.style.pointerEvents = "auto";
  }

},50);

},4000);
</script>
