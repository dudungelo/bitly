<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Score808: Akses Link Aman</title>
<meta name="robots" content="noindex,nofollow">
<link href='https://cdn.jsdelivr.net/gh/kebutuhanpublik/kebutuhanpublik.github.io@main/favicon.ico' rel='icon' type='image/x-icon'/> 
      <link rel="canonical" href="https://bitly.candil.eu.org/tigoals">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:'Poppins',system-ui;
background:linear-gradient(135deg,#0f172a,#020617);
color:#e5e7eb;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* BOX */
.box{
max-width:420px;
width:100%;
padding:24px;
border-radius:18px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 20px 60px rgba(0,0,0,.6);
text-align:center;
}

h1{font-size:20px;margin-bottom:6px;}
p{font-size:13px;color:#9ca3af;margin-bottom:16px;}

/* preview */
.preview{
background:rgba(0,0,0,.4);
border:1px solid #1e293b;
padding:10px;
border-radius:10px;
font-size:12px;
word-break:break-all;
margin-bottom:14px;
}

/* progress */
.progress{
height:6px;
background:#1e293b;
border-radius:999px;
overflow:hidden;
margin-bottom:14px;
}
.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#22c55e,#3b82f6);
}

/* button */
.btn{
display:block;
margin-top:10px;
padding:12px;
border-radius:999px;
text-decoration:none;
font-size:13px;
font-weight:600;
transition:.3s;
}
.btn-main{
background:linear-gradient(135deg,#3b82f6,#2563eb);
color:#fff;
opacity:.5;
pointer-events:none;
}

/* LIST PUTIH */
.link-list{
margin-top:14px;
background:#fff;
border-radius:14px;
padding:10px;
display:none;
}
.link-item{
display:block;
padding:10px;
margin:6px 0;
border-radius:10px;
text-decoration:none;
font-size:13px;
font-weight:600;
color:#111827;
background:#f3f4f6;
}
.fastest{
background:#d1fae5 !important;
}

/* JOIN */
.join-box{
margin-top:14px;
display:flex;
gap:8px;
}
.join{
flex:1;
padding:10px;
border-radius:999px;
text-decoration:none;
font-size:12px;
font-weight:600;
color:#fff;
text-align:center;
}
.tele{background:#229ED9;}
.wa{background:#25D366;}

/* ADS */
.ads{
margin:14px 0;
min-height:90px;
 background: #fff;
}

/* ADBLOCK */
.adblock-warning{
display:none;
margin-top:12px;
font-size:12px;
color:#f87171;
}
</style>
</head>

<body>

<div class="box">

<h1>🔐 Akses Link Aman</h1>
<p>Tunggu sebentar sebelum membuka link</p>

<div class="preview" id="preview">Memuat link...</div>

<!-- ADS -->
<div class="ads" id="adsBox">
<script src="https://jsc.mgid.com/site/726924.js" async></script>
  <style> div[data-widget-id="1797437"] { min-height: 300px; } </style><div data-type="_mgwidget" data-widget-id="1797437"></div>
<script>(function(w,q){w[q]=w[q]||[];w[q].push(["_mgc.load"])})(window,"_mgq");</script>
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<a id="goBtn" class="btn btn-main">⏳ Tunggu...</a>

<div class="adblock-warning" id="adblockMsg">
⚠️ Matikan AdBlock untuk membuka link
</div>

<!-- LIST LINK -->
<div class="link-list" id="linkList"></div>
<p style="font-size:13px;color:#9ca3af;margin-top:14px;">
⚡ Dapatkan link tercepat & tanpa delay!  
Join sekarang sebelum penuh 🚀
</p>
<!-- JOIN -->
<div class="join-box">
<a href="https://t.me/score808alternative" class="join tele">Telegram</a>
<a href="https://www.whatsapp.com/channel/0029VbC7N00EQIaqwkJiAv0Y" class="join wa">WhatsApp</a>
</div>

</div>

<script>

/* PARAM */
function getParam(n){
  return new URL(location.href).searchParams.get(n);
}

/* DECODE */
function decode(str){
  try{
    return decodeURIComponent(atob(str).split('').map(c =>
      '%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2)
    ).join(''));
  }catch(e){
    return str;
  }
}

const raw = getParam("url") || "";

/* DEFAULT 3 LINK */
let links = decode(raw).split(",");
if(!links[0]){
  links = [
    "https://www.google.com/search?q=tigoals+live+candil",
    "https://jalalive.beritanasional.eu.org/",
    "https://tigoals.candil.eu.org/p/score808.html"
  ];
}

/* AMBIL 3 */
links = links.slice(0,3);

const preview = document.getElementById("preview");
const btn = document.getElementById("goBtn");
const linkList = document.getElementById("linkList");
const bar = document.getElementById("bar");

/* PROGRESS */
let duration = 12000;
let start = Date.now();

const timer = setInterval(()=>{
  let percent = Math.min(((Date.now()-start)/duration)*100,100);
  bar.style.width = percent+"%";

  if(percent>=100){
    clearInterval(timer);
    showLinks();
    checkFastest();
  }
},50);

/* TAMPILKAN LINK */
function showLinks(){

  preview.innerText = links[0];

  btn.innerText = "🚀 Buka Link";
  btn.href = links[0];
  btn.style.opacity = "1";
  btn.style.pointerEvents = "auto";

  linkList.innerHTML = "";
  linkList.style.display = "block";

  links.forEach((link,i)=>{
    const a = document.createElement("a");
    a.href = link;
    a.className = "link-item";
    a.innerText = "🔗 Server " + (i+1);
    linkList.appendChild(a);
  });

}

/* CEK TERCEPAT */
function checkSpeed(url){
  return new Promise(resolve=>{
    const img = new Image();
    const start = Date.now();

    img.onload = img.onerror = function(){
      resolve(Date.now() - start);
    };

    img.src = url + "?t=" + start;
  });
}

async function checkFastest(){

  preview.innerText = "⚡ Mengecek server tercepat...";

  const results = [];

  for(let link of links){
    const time = await checkSpeed(link);
    results.push({link,time});
  }

  results.sort((a,b)=>a.time-b.time);

  const fastest = results[0].link;

  btn.innerText = "🚀 Buka Server Tercepat";
  btn.href = fastest;

  linkList.innerHTML = "";

  results.forEach((item,i)=>{
    const a = document.createElement("a");
    a.href = item.link;
    a.className = "link-item";

    if(i===0){
      a.innerText = "🏆 Server " + (i+1) + " (Tercepat)";
      a.classList.add("fastest");
    }else{
      a.innerText = "🔗 Server " + (i+1);
    }

    linkList.appendChild(a);
  });

  preview.innerText = fastest;
}

/* ADBLOCK */
setTimeout(()=>{
  const ads = document.getElementById("adsBox");

  if(!ads || ads.offsetHeight < 20){
    document.getElementById("adblockMsg").style.display="block";
    btn.style.pointerEvents="none";
    btn.style.opacity=".3";
  }
},3000);

</script>

</body>
</html>
