<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Loading Link...</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
font-family:system-ui,-apple-system;
background:#0f172a;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

.container{
max-width:480px;
width:100%;
}

.box{
background:#1e293b;
padding:30px;
border-radius:16px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.5);
}

h2{
margin-top:0;
}

p{
color:#cbd5f5;
font-size:14px;
}

button{
margin-top:20px;
padding:14px 22px;
border:none;
border-radius:10px;
background:#22c55e;
color:#fff;
font-size:16px;
cursor:pointer;
width:100%;
font-weight:600;
transition:.2s;
}

button:hover{
background:#16a34a;
}

button:disabled{
background:#475569;
cursor:not-allowed;
}

.ad{
    margin: 20px 0;
    background: #ffffff;
    border-radius: 8px;
    padding: 10px;
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #64748b;
}

.logo{
font-weight:700;
margin-bottom:15px;
font-size:18px;
color:#22c55e;
}

</style>
  <script src="https://jsc.mgid.com/site/726924.js" async></script>
</head>

<body>

<div class="container">

<!-- ADS TOP -->
<div class="ad">

<!-- GANTI DENGAN SCRIPT ADS -->
<style> div[data-widget-id="1797437"] { min-height: 300px; } </style><div data-type="_mgwidget" data-widget-id="1797437"></div>
<script>(function(w,q){w[q]=w[q]||[];w[q].push(["_mgc.load"])})(window,"_mgq");</script>

</div>

<div class="box">

<div class="logo">
Safe Redirect
</div>

<h2>Memuat Link...</h2>

<p>
Tunggu beberapa detik sebelum menuju halaman tujuan.
</p>

<button id="goBtn" disabled>
Menyiapkan Link...
</button>

</div>

<!-- ADS BOTTOM -->
<div class="ad">

<!-- GANTI DENGAN SCRIPT ADS -->
<div data-type="_mgwidget" data-widget-id="1878651"></div>
<script>(function(w,q){w[q]=w[q]||[];w[q].push(["_mgc.load"])})(window,"_mgq");</script>

</div>

</div>

<script>

const params = new URLSearchParams(location.search);
const url = params.get("url");

let timer = 15;

const btn = document.getElementById("goBtn");

const countdown = setInterval(()=>{

timer--;

btn.textContent = "Buka Link ("+timer+")";

if(timer <= 0){

clearInterval(countdown);

btn.disabled = false;

btn.textContent="Buka Link Sekarang";

}

},1000);

btn.onclick = ()=>{

window.location.href = url;

};

</script>

</body>
</html>
