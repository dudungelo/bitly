/* GLOBAL */
body{

/* BOX */
.safe-box{
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.1);
padding:35px 25px;
border-radius:20px;

/* TITLE */

}

/* TEXT */
.safe-box p{

/* ADS */
.ads-top,
.ads-bottom{
    margin: 20px 0;
    background: #ffffff;
    border-radius: 8px;
    padding: 10px;
    min-height: 90px;
    display: flex;
    align-items: center;

/* PROGRESS */
.progress{
height:6px;
background:rgba(255,255,255,.1);
border-radius:10px;
overflow:hidden;
margin:15px 0;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ff87,#00b86b);
transition:width 1s linear;
}

/* BUTTON */
#goBtn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#1a73e8;
color:#fff;
font-size:14px;
font-weight:600;
cursor:pointer;
opacity:.6;
transition:.3s;
}

#goBtn.active{
opacity:1;
background:#22c55e;
}

#goBtn:hover.active{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(34,197,94,.4);
}

/* NOTE */
.safe-note{
font-size:11px;
margin-top:12px;
color:#94a3b8;
}

</style>
  <script src="https://jsc.mgid.com/site/726924.js" async></script>

<body>

<div class="safe-box">

<!-- ADS TOP -->
<div class="ads-top">
<style> div[data-widget-id="1797437"] { min-height: 300px; } </style><div data-type="_mgwidget" data-widget-id="1797437"></div>

<h2>🔒 Match Center Access</h2>

<p>Menyiapkan halaman tujuan, mohon tunggu sebentar...</p>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<button id="goBtn">Memuat...</button>

<!-- ADS BOTTOM -->
<div class="ads-bottom">
<div data-type="_mgwidget" data-widget-id="1878651"></div>
<script>(function(w,q){w[q]=w[q]||[];w[q].push(["_mgc.load"])})(window,"_mgq");</script>

<div class="safe-note">
Sistem keamanan aktif untuk pengalaman terbaik
</div>

</div>

<script>

/* AMBIL PARAM URL */
const params = new URLSearchParams(location.search);
const encoded = params.get("url");

let target = "#";

/* VALIDASI BASE64 */
try {
  if (encoded && encoded.length > 10) {
    target = decodeURIComponent(atob(encoded));
  }
} catch (e) {
  console.log("URL tidak valid");
  target = "#";
}

/* ELEMENT */
const btn = document.getElementById("goBtn");
const bar = document.getElementById("progressBar");

/* ANIMASI SMOOTH */
let duration = 15000; // 15 detik
let start = null;

function animate(timestamp){
  if(!start) start = timestamp;

  let progress = timestamp - start;
  let percent = Math.min((progress / duration) * 100, 100);

  bar.style.width = percent + "%";

  let sisa = Math.ceil((duration - progress) / 1000);
  if(sisa < 0) sisa = 0;

  btn.innerText = sisa > 0 
    ? "Tunggu " + sisa + " detik"
    : "Buka Halaman";

  if(progress < duration){
    requestAnimationFrame(animate);
  } else {
    btn.disabled = false;
    btn.classList.add("active");

    btn.onclick = () => {
      window.location.href = target;
    };
  }
}

/* START */
btn.disabled = true;
requestAnimationFrame(animate);

</script>

</body>
