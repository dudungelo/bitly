}

opacity:1;

}

<body>

<div class="wrapper">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">⚽ Match Akses</div>
    <div class="tagline">Live Score • Jadwal • Hasil</div>
  </div>

  <!-- ARTIKEL -->

    <h1>Live Score & Jadwal Bola Hari Ini</h1>

      Pantau pertandingan sepak bola terbaru dari berbagai liga dunia. 
      Akses cepat ke live score, jadwal kick-off, dan statistik lengkap.
    </p>
  </div>

  <!-- ADS ATAS -->
  <div class="ads">
    <style> div[data-widget-id="1797437"] { min-height: 300px; } </style><div data-type="_mgwidget" data-widget-id="1797437"></div>
<script>(function(w,q){w[q]=w[q]||[];w[q].push(["_mgc.load"])})(window,"_mgq");</script>
  </div>

  <!-- BOX -->
  <div class="safe-box">

    <h2>🔒 Secure Access</h2>

    <p>Menyiapkan halaman tujuan...</p>

    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <button id="goBtn">Memuat...</button>

    <div class="safe-note">
      Redirect aman & terenkripsi
    </div>

  </div>

  <!-- ADS BAWAH -->
  <div class="ads">
   <div data-type="_mgwidget" data-widget-id="1797438"></div>
<script>(function(w,q){w[q]=w[q]||[];w[q].push(["_mgc.load"])})(window,"_mgq");</script>
  </div>

</div>

<script>

/* MGID INIT */
(function(w,q){w[q]=w[q]||[];w[q].push(["_mgc.load"])})(window,"_mgq");

/* PARAM */
const params = new URLSearchParams(location.search);
const encoded = params.get("url");

let target = "#";

try{
if(encoded && encoded.length > 10){
target = decodeURIComponent(atob(encoded));
}
}catch(e){}

/* ELEMENT */
const btn = document.getElementById("goBtn");
const bar = document.getElementById("progressBar");

/* TIMER */
let duration = 12000;
let start = null;

function animate(t){
if(!start) start = t;

let progress = t - start;
let percent = Math.min((progress/duration)*100,100);

bar.style.width = percent + "%";

let sisa = Math.ceil((duration-progress)/1000);
if(sisa < 0) sisa = 0;

btn.innerText = sisa>0 ? "Tunggu "+sisa+" detik" : "Buka Halaman";

if(progress < duration){
requestAnimationFrame(animate);
}else{
btn.disabled = false;
btn.classList.add("active");
btn.onclick = ()=> window.location.href = target;
}
}

btn.disabled = true;
requestAnimationFrame(animate);

</script>
</body>
